services:
  # Backend Risk Engine
  - type: web
    name: acrif-backend
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn engine.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./risk_intelligence.db
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Dashboard
  - type: web
    name: acrif-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        value: https://acrif-backend-tcsh.onrender.com
