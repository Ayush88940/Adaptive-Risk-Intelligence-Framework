services:
  # Backend Risk Engine
  - type: web
    name: acrif-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn engine.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./risk_intelligence.db
      - key: PYTHON_VERSION
        value: 3.9.0

  # Frontend Dashboard
  - type: web
    name: acrif-dashboard
    runtime: static
    plan: free
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        fromService:
          name: acrif-backend
          type: web
          property: host
