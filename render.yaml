services:
  # 1. Backend API (FastAPI)
  - type: web
    name: acrif-api
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r engine/requirements.txt
    startCommand: uvicorn engine.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./risk_intelligence.db
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Frontend Dashboard (React/Vite)
  - type: web
    name: acrif-app
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: acrif-api
          property: host
